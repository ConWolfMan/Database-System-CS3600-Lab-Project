<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Online Phone Book</title>


    <!--Note, load bootsrap first or it'll override some of the styling from the css file-->
    <!-- Enabling bootstrap for forms stuff -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

    <!-- This links to the my_style.css file so that we can apply its styling -->
    <link rel="stylesheet" href="my_style.css">


</head>
<body>
    <!-- Top header navbar -->
    <nav class="navbar">
        <a href="../index.html" class="nav-link">Home</a> <!-- ! note to team : These are just temp examples, change in the future !  -->
        <a href="browse_contacts.html" class="nav-link">Browse Contacts</a>
        <a href="add_contact.html" class="nav-link">Add Contact</a>
        <a href="delete_contact.html" class="nav-link">Delete Contact</a>
    </nav>

    <!-- hero / header -->
    <header class="hero">
        <h1>Add New Contact</h1>
        <h3>Fill out entire form carefully</h3>
    </header>
  
    <div class="content-panel">
    <div class="form-content">
        <form>

            <h3>Personal Information</h3>
            <!-- Name row -->
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-label" for="first_name">First Name</label>
                            <input class="form-input" type="text" id="first_name" name="first_name" placeholder="First name" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-label" for="last_name">Last Name</label>
                            <input class="form-input" type="text" id="last_name" name="last_name" placeholder="Last name" required>
                    </div>
                </div>
            </div>

            <!-- Street address row -->
            <div class="row">
                <div class ="col-12">
                    <div class="form-group">
                        <label class="form-label" for="str_address">Street Address</label>
                            <input class="form-input" type="text" id="str_address" name="str_address" placeholder="1234 example st" optional>
                    </div>
                </div>
            </div>

            <!-- City, state, zip row -->
            <div class="row">
                <div class="col-md-4">
                    <div class="form-group ">
                        <label class="form-label" for="city">City</label>
                            <input class="form-input" type="text" id="city" name="city" placeholder="City" optional>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group">
                        <label class="form-label" for="state">State</label>
                            <input class="form-input" type="text" id="state" name="state" placeholder="State" optional>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group">
                        <label class="form-label" for="zip">Zip Code</label>
                            <input class="form-input" type="text" id="zip" name="zip" placeholder="Zip Code" optional>
                    </div>
                </div>
            </div>


            <h3>Contact Information</h3>

            <!-- Phone number row -->
            <div class="row">
                <div class="col-12">
                    <div class="form-group">
                        <label class="form-label" for="phone">Phone Number</label>
                            <input class="form-input" type="text" id="phone" name="phone" placeholder="XXX-XXX-XXXX" required>
                    </div>
                </div>
            </div>

            <!-- Email row -->
            <div class="row">
                <div class="col-12">
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                            <input class="form-input" type="email" id="email" name="email" placeholder="example@email.com">
                    </div>
                </div>
            </div>

            <!-- Type row -->
            <div class="row">
                <div class="col-12">
                    <div class="form-group">
                        <label class="form-label" for="type">Contact Type</label> 
                            <select class="form-input" id="type" name="type">
                                <option value="">Select type</option>
                                <option value="personal">Personal</option>
                                <option value="business">Business</option>
                                <option value="government">Government</option>
                                <option value="non_profit">Non-Profit</option>
                            </select>
                    </div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Submit</button>
                <button type="reset" class="btn btn-secondary">Reset</button>
            </div>

        </form>
    </div>
</div>

</body>

</html>
