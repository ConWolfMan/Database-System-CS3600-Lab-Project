<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Contact — Phone Book</title>
 <!--Note, load bootsrap first or it'll override some of the styling from the css file-->
    <!-- Enabling bootstrap for forms stuff -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

    <!-- This links to the my_style.css file so that we can apply its styling -->
    <link rel="stylesheet" href="my_style.css">

</head>
<body>

  <!-- Top header navbar -->
    <nav class="navbar">
        <a href="../index.html" class="nav-link">Home</a> <!-- ! note to team : These are just temp examples, change in the future !  -->
        <a href="browse_contacts.html" class="nav-link">Browse Contacts</a>
        <a href="add_contact.html" class="nav-link">Add Contact</a>
        <a href="edit_contact.html" class="nav-link">Edit Contact</a>
        <a href="delete_contact.html" class="nav-link">Delete Contact</a>
    </nav>

    <!-- hero / header -->
    <header class="hero">
        <h1>Add New Contact</h1>
        <h3>Fill out the form carefully</h3>
    </header>

    <div class="content-panel">
        <p id="form-status" class="status-msg" style="display:none;"></p>

        <div class="form-content">
            <form id="add-form" action="#">

                <div class="form-group">
                    <label for="name">Full Name <span class="required">*</span></label>
                    <input class="form-input" type="text" id="name" placeholder="e.g. Jane Smith">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number <span class="required">*</span></label>
                    <input type="text" id="phone" placeholder="XXX-XXX-XXXX">
                </div>

                <div class="form-group">
                    <label for="str_address">Street Address</label>
                    <input type="text" id="str_address" placeholder="1234 Example St">
                </div>

                <div class="form-row" style="grid-template-columns: 2fr 1fr;">
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" placeholder="Springfield">
                    </div>
                    <div class="form-group">
                        <label for="state">State</label>
                        <input type="text" id="state" placeholder="WA">
                    </div>
                </div>

                <div class="form-actions">
                    <!-- type="button" means the browser will NEVER submit this form natively -->
                    <button type="button" class="btn btn-primary" id="submit-btn">Add Contact</button>
                    <button type="reset" class="btn btn-secondary">Clear Form</button>
                </div>

            </form>
        </div>
    </div>

     <!-- Bottom footer navbar -->
    <footer class="footer"> <!-- ! Note to team, these pages do not exist yet, we'll probably need to make them soon ! -->
        <p>
            &copy; 2026 "Online Phone Book Database". All rights reserved.
                &nbsp;|&nbsp;
                <a href="cookie_policy.html">Cookie Policy</a>
                &nbsp;|&nbsp;
                    <a href="privacy_policy.html">Privacy Policy</a>
                &nbsp;|&nbsp;
                    <a href="terms_and_cond.html">Terms and Conditions</a>
        </p>
    </footer>

    <script>
        const statusEl  = document.getElementById('form-status');
        const submitBtn = document.getElementById('submit-btn');

        function showStatus(msg, type) {
            statusEl.textContent = msg;
            statusEl.className = 'status-msg ' + (type || '');
            statusEl.style.display = '';
            statusEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // type="button" means the browser never submits the form natively.
        // All submission logic lives here.
        submitBtn.addEventListener('click', async function() {
            const name  = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();

            if (!name)  { showStatus('Please enter a full name.', 'error'); return; }
            if (!phone) { showStatus('Phone number is required.', 'error'); return; }

            const payload = {
                Name:        name,
                PhoneNumber: phone,
                Address:     document.getElementById('str_address').value.trim(),
                City:        document.getElementById('city').value.trim(),
                State:       document.getElementById('state').value.trim(),
            };

            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving…';

            try {
                const res = await fetch('http://127.0.0.1:5000/api/contacts', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify(payload),
                });

                if (res.ok) {
                    showStatus('✓ Contact added! Redirecting to contacts list…', 'success');
                    setTimeout(() => { window.location.href = 'browse_contacts.html'; }, 1500);
                } else {
                    const errData = await res.json().catch(() => ({}));
                    showStatus('Error: ' + (errData.error || res.statusText), 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Add Contact';
                }
            } catch (err) {
                showStatus('Could not reach the server. Make sure it is running.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Add Contact';
            }
        });
    </script>
</body>
</html>
