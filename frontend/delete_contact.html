    <!-- hero / header -->
    <header class="hero">
        <h1>Contact Take Down Request</h1>
        <h3>Fill out entire form carefully</h3>
    </header>
  
    <div class="content-panel">
    <h2>Deletion Request</h2>
    <div class="form-content">
        <form>

            <h3></h3>
            <!-- Name row -->
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-label" for="first_name">First Name</label>
                            <input class="form-input" type="text" id="first_name" name="first_name" placeholder="First name" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label class="form-label" for="last_name">Last Name</label>
                            <input class="form-input" type="text" id="last_name" name="last_name" placeholder="Last name" required>
                    </div>
                </div>
            </div>

            <!-- Phone number row -->
            <div class="row">
                <div class="col-12">
                    <div class="form-group">
                        <label class="form-label" for="phone">Phone Number</label>
                            <input class="form-input" type="text" id="phone" name="phone" placeholder="XXX-XXX-XXXX" required>
                    </div>
                </div>
            </div>

            <!-- Reason field -->
            <div class="row">
                <div class="col-12">
                    <div class="form-group">
                        <label class="form-label" for="reason">Reason for Deletion</label>
                            <textarea class="form-input" id="reason" name="reason" 
                                placeholder="Please provide a reason for the deletion request" rows="4" required></textarea>
                    </div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Submit</button>
                <button type="reset" class="btn btn-secondary">Reset</button>
            </div>

        </form>
    </div>
</div>
