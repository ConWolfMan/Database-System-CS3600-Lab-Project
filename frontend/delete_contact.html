<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Contact — Phone Book</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" 
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" 
          crossorigin="anonymous">

    <!-- Custom styles -->
    <link rel="stylesheet" href="my_style.css">
</head>
<body>

    <!-- Top navbar -->
    <nav class="navbar">
        <a href="../index.html" class="nav-link">Home</a>
        <a href="browse_contacts.html" class="nav-link">Browse Contacts</a>
        <a href="add_contact.html" class="nav-link">Add Contact</a>
        <a href="edit_contact.html" class="nav-link">Edit Contact</a>
        <a href="delete_contact.html" class="nav-link">Delete Contact</a>
    </nav>

    <!-- Hero header -->
    <header class="hero">
        <h1>Delete Contact</h1>
        <h3>Enter the phone number of the contact to delete</h3>
    </header>

    <div class="content-panel">
        <p id="form-status" class="status-msg" style="display:none;"></p>

        <div class="form-content">
            <form id="delete-form">

                <h3>Contact Information</h3>

                <!-- Phone number -->
                <div class="form-group">
                    <label for="phone">Phone Number <span class="required">*</span></label>
                    <input class="form-input" type="text" id="phone" placeholder="XXX-XXX-XXXX" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submit-btn">Delete Contact</button>
                    <button type="reset" class="btn btn-secondary">Clear Form</button>
                </div>

            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>
            &copy; 2026 "Online Phone Book Database". All rights reserved.
                &nbsp;|&nbsp;
                <a href="cookie_policy.html">Cookie Policy</a>
                &nbsp;|&nbsp;
                <a href="privacy_policy.html">Privacy Policy</a>
                &nbsp;|&nbsp;
                <a href="terms_and_cond.html">Terms and Conditions</a>
        </p>
    </footer>

    <script>
        const form      = document.getElementById('delete-form');
        const statusEl  = document.getElementById('form-status');
        const submitBtn = document.getElementById('submit-btn');

        function showStatus(msg, type) {
            statusEl.textContent = msg;
            statusEl.className = `status-msg ${type || ''}`;
            statusEl.style.display = 'block';
            statusEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const phone = document.getElementById('phone').value.trim();

            if (!phone) { showStatus('Phone number is required.', 'error'); return; }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Deleting…';

            try {
                const res = await fetch(`http://127.0.0.1:5000/api/contacts/${encodeURIComponent(phone)}`, {
                    method: 'DELETE',
                });

                if (res.ok) {
                    showStatus('✓ Contact deleted successfully!', 'success');
                    form.reset();
                } else {
                    const errData = await res.json().catch(() => ({}));
                    showStatus('Error: ' + (errData.error || res.statusText), 'error');
                }
            } catch (err) {
                showStatus('Could not reach the server. Make sure it is running.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Delete Contact';
            }
        });
    </script>
</body>
</html>
